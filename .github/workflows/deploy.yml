name: Security CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required by SonarCloud for deep git history analysis

    - name: SonarQube Cloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=developer-310_bharath-fresh-grocerys
          -Dsonar.organization=developer-310
          -Dsonar.sources=.

    # 2. BUILD ENGINE: Setup Docker buildx environment
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # ==========================================
    # 3. FRONTEND: Build & Security Scan
    # ==========================================
    - name: Build Frontend Image for Scanning
      run: |
        docker build -t node-vite-app:test .

    - name: Run Trivy Frontend Security Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'node-vite-app:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # ==========================================
    # 4. BACKEND: Build & Security Scan
    # ==========================================
    - name: Build Backend Image for Scanning
      run: |
        docker build -t node-backend-app:test ./backend

    - name: Run Trivy Backend Security Scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: 'node-backend-app:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # ==========================================
    # 5. GCP AUTHENTICATION & DOCKER SETUP
    # ==========================================
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }} # Secure Service Account key

    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

    # ==========================================
    # 6. REGISTRY PUSH: Frontend & Backend Images
    # ==========================================
    - name: Push Frontend Production Image
      run: |
        docker tag node-vite-app:test asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-vite-app:${{ github.sha }}
        docker tag node-vite-app:test asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-vite-app:latest
        docker push asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-vite-app:${{ github.sha }}
        docker push asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-vite-app:latest

    - name: Push Backend Production Image
      run: |
        docker tag node-backend-app:test asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-backend-app:${{ github.sha }}
        docker tag node-backend-app:test asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-backend-app:latest
        docker push asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-backend-app:${{ github.sha }}
        docker push asia-south1-docker.pkg.dev/practiceproject-495412/new-project-repo/node-backend-app:latest

    # ==========================================
    # 7. DEPLOY TO GKE: Apply Combined Manifest
    # ==========================================
    - name: Connect to GKE and Deploy
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: 'new-project-cluster'
        location: 'asia-south1'

    - name: Deploy Manifests to Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yml
        kubectl rollout restart deployment/node-vite-app
        kubectl rollout restart deployment/node-backend-app